[tools]
java = "temurin-21.0.6+7.0.LTS"
clojure = "1.12.1"

[tasks.test]
description = "Run all tests with Kaocha"
raw = true
run = "clojure -M:test:dev"

[tasks.typecheck]
description = "Run the Typed Clojure type checker on this codebase"
raw = true
run = "clojure -M -m typedclojure-lsp.runner"

[tasks.format]
description = "Format code with cljfmt"
run = "clojure -M:format"

[tasks.dev]
description = "Start LSP with nREPL + FlowStorm debugger for development"
raw = true
run = "clojure -X:test:dev:flowstorm typedclojure-lsp.dev/start!"

[tasks.outdated]
description = "Check for outdated dependencies"
raw = true
run = "clojure -M:antq"

[tasks.jar]
description = "Build the library JAR for Clojars"
run = "clojure -T:build jar"

[tasks.deploy]
description = "Deploy to Clojars"
run = "clojure -T:build deploy"

[tasks.vscode-package]
description = "Package the VS Code extension as a .vsix"
dir = "vscode-extension"
run = "npx @vscode/vsce package --allow-missing-repository"

[tasks.update-lsp-schema]
description = "Fetch the latest LSP meta model from Microsoft"
run = "curl -s https://microsoft.github.io/language-server-protocol/specifications/lsp/3.17/metaModel/metaModel.json > resources/typedclojure-lsp/lsp-meta-model.json"

[tasks.generate-lsp-json-schema]
description = "Generate JSON Schema from LSP meta model"
raw = true
run = "clojure -M -m typedclojure-lsp.schema.convert"
